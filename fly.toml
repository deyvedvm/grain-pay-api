app = "grain-pay-api"
primary_region = "gru"

[build]

[env]
  SPRING_PROFILES_ACTIVE = "prod"

# Secrets (nunca colocar valores aqui — usar fly secrets set):
#   fly secrets set POSTGRES_DATASOURCE_URL="jdbc:postgresql://host/db?sslmode=require"
#   fly secrets set POSTGRES_DATASOURCE_USERNAME="usuario"
#   fly secrets set POSTGRES_DATASOURCE_PASSWORD="senha"
#   fly secrets set JWT_SECRET="sua-chave-secreta"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/actuator/health"
  port = 8080
  timeout = "5s"
